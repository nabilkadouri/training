<section>
  <div class="max-w-screen-xl m-auto">
    <h1 class="text-center font-bold py-10 text-5xl">Voiture de rêve</h1>
    <div class="flex justify-center gap-10 mb-10">
      <input [(ngModel)]="searchTerm" type="search" placeholder="Rechercher model" class="border rounded-xl w-1/2 p-2" (input)="search()">
      <select [(ngModel)]="selectedModel" aria-label="Exemple select" class="w/1/2 border rounded-xl p-2" (change)="filtrerSelect()">
        <option value="">Choisir votre modèle</option>
        <option value="Tesla">Tesla</option>
        <option value="Porsche">Porsche</option>
        <option value="Toyota">Toyota</option>
        <option value="Ford">Ford</option>
        <option value="Renault">Renault</option>
      </select>
    </div>
    <div class="flex justify-center flex-wrap gap-5">
      <div *ngFor="let car of filteredCars" class="flex flex-wrap items-center border border-amber-500 rounded-2xl w-64 shadow-xl h-[500px]">
        <div class=" rounded-2xl flex flex-col justify-center items-center ">
          <img [src]="car.images" alt="" class="rounded-t-2xl h-full">
          <div class="flex flex-col items-center gap-3 w-full  p-5">
            <h2 class="text-4xl font-semibold text-amber-700">{{car.marque}}</h2>
            <h3 class="text-3xl">{{car.modele}}</h3>
            <ul class="space-y-4 ">
              <li class="font-semibold"> Options : <br>{{car.options}}</li>
              <li class="flex "> <span><img [src]="car.svg" alt="" class="h-8 w-8"></span> {{car.type}}</li>
            </ul>
            <p class=" bg-amber-300 px-2 py-1 rounded-lg text-amber-950 font-semibold">Tarif : {{car.prix}} €</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
